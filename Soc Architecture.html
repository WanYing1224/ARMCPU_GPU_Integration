  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    font-size: 11px;
    letter-spacing: 0.1em;

  }
  .label-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9.5px;

  }
  .label-tiny {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8.5px;

  }

  .arrow { fill: none; stroke-width: 1.5; marker-end: url(#arrowBlue); }
  .arrow-green { fill: none; stroke-width: 1.5; marker-end: url(#arrowGreen); }
  .arrow-amber { fill: none; stroke-width: 1.5; marker-end: url(#arrowAmber); }

  .badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .badge-new { fill: #4ac860; }
  .badge-box-new { fill: #0a2010; stroke: #4ac860; stroke-width: 1; }
  .badge-pass { fill: #60c8c8; }
  .badge-box-pass { fill: #081a1a; stroke: #40a8a8; stroke-width: 1; }
